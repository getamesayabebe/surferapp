<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/png" href="222.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Market Intelligence | live</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://s3.tradingview.com/tv.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="authentication.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #000000;
        }
        .glass-nav {
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(247, 70, 70, 0.05);
        }
        .hero-gradient {
            background: radial-gradient(circle at 50% 50%, rgba(147, 51, 234, 0.1) 0%, transparent 50%);
        }
    </style>
</head>
<body class="min-h-screen bg-black text-slate-200 antialiased hero-gradient">
    <!-- Navigation -->
    <nav class="fixed w-full z-[100] glass-nav">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-20 items-center">
                <a href="dashboard.html" class="flex items-center gap-3">
                    <img src="222.png" alt="Surfer logo" class="w-10 h-10 rounded-xl bg-indigo-600/20 p-1 shadow-lg shadow-indigo-500/20" />
                    <span class="text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-white to-slate-400">Surfer Trading</span>
                </a>
                
                <div class="hidden md:flex items-center space-x-10 text-sm font-semibold tracking-wide">
                   
                    <a href="dashboard.html" class="text-slate-400 hover:text-white transition-colors">Dashboard</a>
                    <a href="charts.html" class="text-slate-400 hover:text-white transition-colors">Charts</a>
                    <a id="desktopAdminBtn" href="admin.html" class="hidden text-slate-400 hover:text-white transition-colors">Admin</a>
                    <a href="book-review.html" class="bg-indigo-600 hover:bg-indigo-500 text-white px-6 py-2.5 rounded-full transition-all shadow-lg shadow-indigo-600/20 active:scale-95">
                        Library
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <div class="max-w-6xl mx-auto px-6 pt-32 pb-14">
        <div class="text-center mb-12">
            <div class="inline-flex items-center gap-2 px-4 py-1.5 rounded-full bg-purple-500/10 border border-purple-500/20 text-purple-400 text-xs font-black uppercase tracking-widest mb-6">
                Live Market News
            </div>
            <h1 class="text-4xl md:text-5xl font-black text-white mb-4 tracking-tight">Market <span class="text-purple-500">Intelligence</span></h1>
            <p class="text-lg text-slate-400 max-w-2xl mx-auto">
                Real-time financial news, central bank updates, and global macro analysis.
            </p>
        </div>
        
        <!-- TradingView News Widget -->
        <div class="bg-black border border-slate-800 rounded-[2rem] overflow-hidden shadow-2xl h-[700px]">
            <div class="tradingview-widget-container h-full">
                <div class="tradingview-widget-container__widget h-full"></div>
                <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-timeline.js" async>
                {
                "feedMode": "all_symbols",
                "colorTheme": "dark",
                "isTransparent": true,
                "displayMode": "regular",
                "width": "100%",
                "height": "100%",
                "locale": "en"
                }
                </script>
            </div>
        </div>
        
        <div class="mt-12 flex flex-col sm:flex-row justify-center gap-4">
            <a href="dashboard.html" class="px-8 py-4 bg-purple-600 hover:bg-purple-500 text-white rounded-2xl font-bold transition-all shadow-xl shadow-purple-600/20 active:scale-95">
                Go to Dashboard
            </a>
            <a href="charts.html" class="px-8 py-4 bg-black border border-slate-800 text-white rounded-2xl font-bold transition-all hover:bg-slate-800 active:scale-95">
                Live Charts
            </a>
        </div>
        
        <div class="mt-20 pt-12 border-t border-slate-900 text-center">
            <p class="text-slate-600 text-sm font-bold uppercase tracking-[0.2em]">&copy; 2026 Surfer Trading</p>
        </div>
    </div>
</body>
</html>
